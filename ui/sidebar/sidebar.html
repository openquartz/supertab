<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TabFlow</title>
    <link rel="stylesheet" href="sidebar.css">
</head>
<body>
    <div id="tabflow-app">
        <!-- 头部 -->
        <header class="tf-header">
            <div class="tf-brand">
                <h1>TabFlow</h1>
            </div>
            <div class="tf-actions">
                <button id="select-mode-btn" class="tf-btn tf-btn-icon" title="多选模式" aria-label="多选模式">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 11 12 14 22 4"></polyline>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                </button>
                <button id="refresh-btn" class="tf-btn tf-btn-icon" title="刷新" aria-label="刷新">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6M1 20v-6h6"/>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
                    </svg>
                </button>
                <button id="settings-btn" class="tf-btn tf-btn-icon" title="设置" aria-label="设置">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 搜索框 -->
        <div class="tf-search-container">
            <div class="tf-search-box">
                <span class="tf-search-icon">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8"/>
                        <path d="M21 21l-4.35-4.35"/>
                    </svg>
                </span>
                <input type="text" id="search-input" placeholder="搜索标签页" class="tf-search-input">
            </div>
        </div>

        <!-- 分组选择器 -->
        <div class="tf-group-selector">
            <button class="tf-group-btn active" data-group="domain">
                域名
            </button>
            <button class="tf-group-btn" data-group="date">
                时间
            </button>
            <button class="tf-group-btn" data-group="custom">
                自定义
            </button>
            <button class="tf-group-btn" data-group="session">
                会话
            </button>
        </div>

        <!-- 分组内容区域 -->
        <div class="tf-content">
            <div id="domain-groups" class="tf-group-container active">
                <!-- 域名分组内容 -->
            </div>

            <div id="date-groups" class="tf-group-container">
                <!-- 日期分组内容 -->
            </div>

            <div id="custom-groups" class="tf-group-container">
                <!-- 自定义分组内容 -->
            </div>

            <div id="session-groups" class="tf-group-container">
                <!-- 会话分组内容 -->
            </div>
        </div>

        <!-- 底部操作栏 -->
        <footer class="tf-footer">
            <div class="tf-footer-actions">
                <button id="batch-favorite-btn" class="tf-btn tf-btn-secondary tf-hidden" title="转收藏选中的标签页">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span>转收藏选中 (0)</span>
                </button>
                <button id="create-group-btn" class="tf-btn tf-btn-primary">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="12" y1="5" x2="12" y2="19"/>
                        <line x1="5" y1="12" x2="19" y2="12"/>
                    </svg>
                    <span>新建分组</span>
                </button>
            </div>
            <div class="tf-stats">
                <span id="tab-count">0 个标签页</span>
                <span id="group-count">0 个分组</span>
            </div>
        </footer>
    </div>

    <!-- 上下文菜单 (由JavaScript动态创建) -->
    <div id="context-menu" class="tf-context-menu tf-hidden"></div>

    <!-- 加载指示器 -->
    <div id="loading-overlay" class="tf-loading tf-hidden">
        <div class="tf-loading-spinner"></div>
        <div class="tf-loading-text">加载中...</div>
    </div>

    <!-- Import custom elements -->
    <script src="../components/group-item.js"></script>
    <script src="../components/tab-item.js"></script>
    <script src="sidebar.js"></script>
</body>
</html>
