<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SuperTab - 底部面板</title>
    <link rel="stylesheet" href="bottom-panel.css">
</head>
<body>
    <div id="tabflow-bottom-panel">
        <!-- 顶部控制栏 -->
        <header class="tf-bottom-header">
            <div class="tf-bottom-brand">
                <h1>SuperTab</h1>
                <span class="tf-mode-indicator">底部模式</span>
            </div>
            <div class="tf-bottom-actions">
                <button id="close-bottom-panel" class="tf-btn tf-btn-icon" title="关闭底部面板">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <button id="switch-to-sidebar" class="tf-btn tf-btn-secondary" title="切换到侧边栏模式">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
                        <line x1="9" y1="3" x2="9" y2="21"/>
                    </svg>
                    <span>侧边栏</span>
                </button>
            </div>
        </header>

        <!-- 搜索和筛选控制栏 -->
        <div class="tf-controls-bar">
            <div class="tf-search-section">
                <div class="tf-search-box">
                    <span class="tf-search-icon">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="M21 21l-4.35-4.35"/>
                        </svg>
                    </span>
                    <input type="text" id="bottom-search-input" placeholder="搜索标签页标题、URL或备注..." class="tf-search-input">
                    <button id="clear-search" class="tf-btn tf-btn-icon tf-hidden" title="清除搜索">
                        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                    </button>
                </div>

                <div class="tf-filter-controls">
                    <select id="group-filter" class="tf-filter-select">
                        <option value="all">所有分组</option>
                        <option value="domain">域名分组</option>
                        <option value="date">时间分组</option>
                        <option value="custom">自定义分组</option>
                        <option value="session">会话分组</option>
                    </select>

                    <select id="sort-filter" class="tf-filter-select">
                        <option value="lastAccessed">最近访问</option>
                        <option value="title">标题排序</option>
                        <option value="url">域名排序</option>
                        <option value="created">创建时间</option>
                    </select>
                </div>
            </div>

            <!-- 批量操作工具栏 -->
            <div class="tf-batch-toolbar">
                <div class="tf-selection-info">
                    <span id="selection-count">已选择 0 个标签页</span>
                </div>

                <div class="tf-batch-actions">
                    <button id="select-all" class="tf-btn tf-btn-secondary" title="全选">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="9 11 12 14 22 4"></polyline>
                            <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                        </svg>
                        <span>全选</span>
                    </button>

                    <button id="select-none" class="tf-btn tf-btn-secondary tf-hidden" title="取消选择">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M18 6L6 18"></path>
                            <path d="M6 6l12 12"></path>
                        </svg>
                        <span>取消选择</span>
                    </button>

                    <button id="batch-bookmark" class="tf-btn tf-btn-secondary tf-hidden" title="批量收藏">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                        </svg>
                        <span>收藏</span>
                    </button>

                    <button id="batch-move" class="tf-btn tf-btn-secondary tf-hidden" title="批量移动">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <polyline points="10 15 15 10 10 5"></polyline>
                            <path d="M15 10h4v4h-4z"></path>
                            <path d="M4 19h16"></path>
                        </svg>
                        <span>移动</span>
                    </button>

                    <button id="batch-close" class="tf-btn tf-btn-danger tf-hidden" title="批量关闭">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <line x1="18" y1="6" x2="6" y2="18"/>
                            <line x1="6" y1="6" x2="18" y2="18"/>
                        </svg>
                        <span>关闭</span>
                    </button>
                </div>
            </div>
        </div>

        <!-- 标签页卡片网格区域 -->
        <main class="tf-tabs-grid-container">
            <div id="tabs-grid" class="tf-tabs-grid">
                <!-- 标签页卡片将通过JavaScript动态生成 -->
            </div>

            <!-- 空状态 -->
            <div id="empty-state" class="tf-empty-state tf-hidden">
                <div class="tf-empty-icon">📭</div>
                <h3>暂无标签页</h3>
                <p id="empty-state-message">当前分组下没有找到标签页</p>
            </div>

            <!-- 加载状态 -->
            <div id="loading-state" class="tf-loading-state tf-hidden">
                <div class="tf-loading-spinner"></div>
                <p>加载标签页中...</p>
            </div>
        </main>

        <!-- 底部状态栏 -->
        <footer class="tf-bottom-footer">
            <div class="tf-status-info">
                <span id="total-tabs">共 0 个标签页</span>
                <span class="tf-divider">•</span>
                <span id="total-groups">0 个分组</span>
            </div>

            <div class="tf-view-controls">
                <button id="grid-size-small" class="tf-btn tf-btn-icon" title="小网格">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="7" height="7"></rect>
                        <rect x="14" y="3" width="7" height="7"></rect>
                        <rect x="14" y="14" width="7" height="7"></rect>
                        <rect x="3" y="14" width="7" height="7"></rect>
                    </svg>
                </button>

                <button id="grid-size-medium" class="tf-btn tf-btn-icon active" title="中等网格">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="5" height="5"></rect>
                        <rect x="10" y="3" width="5" height="5"></rect>
                        <rect x="17" y="3" width="5" height="5"></rect>
                        <rect x="3" y="10" width="5" height="5"></rect>
                        <rect x="10" y="10" width="5" height="5"></rect>
                        <rect x="17" y="10" width="5" height="5"></rect>
                        <rect x="3" y="17" width="5" height="5"></rect>
                        <rect x="10" y="17" width="5" height="5"></rect>
                        <rect x="17" y="17" width="5" height="5"></rect>
                    </svg>
                </button>

                <button id="grid-size-large" class="tf-btn tf-btn-icon" title="大网格">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <rect x="3" y="3" width="3" height="3"></rect>
                        <rect x="8" y="3" width="3" height="3"></rect>
                        <rect x="13" y="3" width="3" height="3"></rect>
                        <rect x="18" y="3" width="3" height="3"></rect>
                        <rect x="3" y="8" width="3" height="3"></rect>
                        <rect x="8" y="8" width="3" height="3"></rect>
                        <rect x="13" y="8" width="3" height="3"></rect>
                        <rect x="18" y="8" width="3" height="3"></rect>
                        <rect x="3" y="13" width="3" height="3"></rect>
                        <rect x="8" y="13" width="3" height="3"></rect>
                        <rect x="13" y="13" width="3" height="3"></rect>
                        <rect x="18" y="13" width="3" height="3"></rect>
                        <rect x="3" y="18" width="3" height="3"></rect>
                        <rect x="8" y="18" width="3" height="3"></rect>
                        <rect x="13" y="18" width="3" height="3"></rect>
                        <rect x="18" y="18" width="3" height="3"></rect>
                    </svg>
                </button>
            </div>

            <div class="tf-group-quick-switch">
                <select id="quick-group-switch">
                    <option value="all">所有标签页</option>
                    <!-- 动态生成分组选项 -->
                </select>
            </div>
        </footer>
    </div>

    <!-- 标签页卡片模板 -->
    <template id="tab-card-template">
        <div class="tf-tab-card" data-tab-id="" draggable="true">
            <div class="tf-card-header">
                <div class="tf-tab-favicon">
                    <img src="" alt="" onerror="this.style.display='none'">
                    <span class="tf-favicon-placeholder">🌐</span>
                </div>
                <button class="tf-card-select-btn" title="选择">
                    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="9 11 12 14 22 4"></polyline>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path>
                    </svg>
                </button>
            </div>

            <div class="tf-card-content">
                <div class="tf-tab-title"></div>
                <div class="tf-tab-note"></div>
            </div>

            <div class="tf-card-actions">
                <button class="tf-card-action-btn" title="打开标签页" data-action="open">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                        <polyline points="15 3 21 3 21 9"></polyline>
                        <line x1="10" y1="17" x2="21" y2="6"></line>
                    </svg>
                </button>
                <button class="tf-card-action-btn" title="添加备注" data-action="note">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M12 20h9"></path>
                        <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
                    </svg>
                </button>
                <button class="tf-card-action-btn" title="关闭标签页" data-action="close">
                    <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
        </div>
    </template>

    <!-- 右键菜单模板 -->
    <div id="context-menu" class="tf-context-menu tf-hidden">
        <div class="tf-context-item" data-action="open">打开标签页</div>
        <div class="tf-context-item" data-action="open-new">在新窗口打开</div>
        <div class="tf-context-divider"></div>
        <div class="tf-context-item" data-action="bookmark">添加到收藏夹</div>
        <div class="tf-context-item" data-action="note">添加备注</div>
        <div class="tf-context-divider"></div>
        <div class="tf-context-item" data-action="move">移动到分组</div>
        <div class="tf-context-item" data-action="duplicate">复制标签页</div>
        <div class="tf-context-divider"></div>
        <div class="tf-context-item tf-context-danger" data-action="close">关闭标签页</div>
    </div>

    <!-- 批量移动分组选择弹窗 -->
    <div id="batch-move-modal" class="tf-modal tf-hidden">
        <div class="tf-modal-backdrop" data-action="close-batch-move"></div>
        <div class="tf-modal-panel">
            <div class="tf-modal-header">
                <h2>移动到分组</h2>
                <button class="tf-btn tf-btn-icon" data-action="close-batch-move">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
            </div>
            <div class="tf-modal-body">
                <div id="batch-move-group-list" class="tf-group-list"></div>
            </div>
            <div class="tf-modal-footer">
                <button class="tf-btn tf-btn-secondary" data-action="close-batch-move">取消</button>
                <button id="batch-move-confirm" class="tf-btn tf-btn-primary">确认移动</button>
            </div>
        </div>
    </div>

    <script src="bottom-panel.js"></script>
</body>
</html>
